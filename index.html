<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CinéVibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ NAVIGATION ══ -->
<nav>
  <div class="logo">Ciné<span>Vibe</span></div>
  <ul class="nav-liens">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="film.html">Films</a></li>
    <li><a href="maliste.html">Ma Liste</a></li>
  </ul>
  <div>
    <button class="btn-chat" onclick="toggleChat()">🎬 Conseiller Films</button>
  </div>
</nav>

<!-- ══ HERO ══ -->
<div class="hero">
  <div class="hero-fond"></div>
  <div class="hero-contenu">
    <div class="hero-badge">🎬 À l'affiche ce soir</div>
    <h1>the secret world of <em>Arrietty</em></h1>
    <div class="hero-meta">
      <span class="note">★ 8.8</span>
      <span>2010 • 1h 35m</span>
      <span>Animation</span>
    </div>
    <div class="hero-actions">
  <button class="btn-principal" onclick="ouvrirVideo(2)">&#9654; &nbsp;Regarder</button>
  <button class="btn-fantome" onclick="ajouterALaListe(2)">+ Ma liste</button>
</div>
  </div>
</div>

<!-- ══ SECTION TENDANCES ══ -->
<section class="px-4 py-4">
  <div class="entete-section">
    <div class="titre-section">En <span>Tendance</span></div>
    <span class="voir-tout"><a href="film.html">Voir tout →</a></span>
  </div>
  <div class="rangee-films" id="rangee-tendances"></div>
</section>

<!-- ══ PIED DE PAGE ══ -->
<footer class="d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div class="logo-pied">Ciné<span>Vibe</span></div>
  <span>© 2025 CinéVibe. Tous droits réservés.</span>
</footer>

<!-- ══ MODAL ══ -->
<div id="superposition-modal" onclick="fermerModal(event)">
  <div class="cinevibe-modal">
    <button class="cinevibe-modal-fermer" onclick="fermerModal()">✕</button>
    <div id="contenu-modal"></div>
  </div>
</div>

<!-- ══ CHATBOT ══ -->
<div id="chatbot">
  <div class="chat-entete">
    <div class="chat-gauche">
      <div class="chat-avatar">🎬</div>
      <div>
        <div class="chat-nom">CineBot</div>
        <div class="chat-statut">Conseiller de films</div>
      </div>
    </div>
    <button class="chat-fermer" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-options" id="chat-options"></div>
</div>


<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script src="maliste.js"></script>
</body>
</html>
