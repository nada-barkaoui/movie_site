<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Films — CinéVibe</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ NAVIGATION ══ -->
<nav>
  <div class="logo">Ciné<span>Vibe</span></div>
  <ul class="nav-liens">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="film.html" style="color:var(--accent2);font-weight:600">Films</a></li>
    <li><a href="maliste.html">Ma Liste</a></li>
  </ul>
  <div>
    <button class="btn-chat" onclick="toggleChat()">🎬 Conseiller Films</button>
  </div>
</nav>

<!-- ══ RECHERCHE ══ -->
<div class="zone-recherche px-4 pt-4">
  <div class="barre-recherche">
    <span style="color:var(--discret)">🔍</span>
    <input type="text" id="champ-recherche" placeholder="Rechercher un film, un genre..." oninput="rechercherFilm()"/>
  </div>
</div>

<!-- ══ FILTRES PAR GENRE ══ -->
<div class="barre-genres d-flex flex-wrap gap-2 px-4 py-3">
  <button class="pill-genre actif" onclick="filtrerGenre('Tous', this)">Tous</button>
  <button class="pill-genre" onclick="filtrerGenre('Action', this)">Action</button>
  <button class="pill-genre" onclick="filtrerGenre('Sci-Fi', this)">Sci-Fi</button>
  <button class="pill-genre" onclick="filtrerGenre('Drame', this)">Drame</button>
  <button class="pill-genre" onclick="filtrerGenre('Comédie', this)">Comédie</button>
  <button class="pill-genre" onclick="filtrerGenre('Horreur', this)">Horreur</button>
  <button class="pill-genre" onclick="filtrerGenre('Romance', this)">Romance</button>
  <button class="pill-genre" onclick="filtrerGenre('Animation', this)">Animation</button>
  <button class="pill-genre" onclick="filtrerGenre('Thriller', this)">Thriller</button>
</div>

<!-- ══ TOUS LES FILMS ══ -->
<section class="px-4 py-3">
  <div class="entete-section">
    <div class="titre-section" id="d1">Tous les <span>Films</span></div>
    <span id="compteur-films" style="font-size:13px;color:var(--discret);"></span>
  </div>
  <div class="grille-films" id="grille-films"></div>
</section>

<div id="rangee-tendances" style="display:none"></div>

<footer class="d-flex align-items-center justify-content-between flex-wrap gap-2">
  <div class="logo-pied">Ciné<span>Vibe</span></div>
  <span>© 2025 CinéVibe.</span>
  <span><a href="index.html" style="color:var(--accent);text-decoration:none">← Retour à l'accueil</a></span>
</footer>

<!-- ══ MODAL ══ -->
<div id="superposition-modal" onclick="fermerModal(event)">
  <div class="cinevibe-modal">
    <button class="cinevibe-modal-fermer" onclick="fermerModal()">✕</button>
    <div id="contenu-modal"></div>
  </div>
</div>

<!-- ══ CHATBOT ══ -->
<div id="chatbot">
  <div class="chat-entete">
    <div class="chat-gauche">
      <div class="chat-avatar">🎬</div>
      <div>
        <div class="chat-nom">CineBot</div>
        <div class="chat-statut">Conseiller de films</div>
      </div>
    </div>
    <button class="chat-fermer" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-options" id="chat-options"></div>
</div>

<!-- ══ VIDEO PLAYER ══ -->
<div id="superposition-video" onclick="fermerVideo(event)" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column;padding:1rem">
  <button onclick="fermerVideo()" style="position:absolute;top:1rem;right:1.5rem;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;z-index:9001">✕</button>
  <div id="titre-video" style="color:#fff;font-family:var(--titre);font-size:1.8rem;margin-bottom:1rem;text-align:center"></div>
  <video id="lecteur-video" controls style="width:100%;max-width:960px;max-height:80vh;border-radius:12px;background:#000">
    Votre navigateur ne supporte pas la lecture vidéo.
  </video>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script src="maliste.js"></script>
</body>
</html>
